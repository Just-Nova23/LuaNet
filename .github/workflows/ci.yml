name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: control-plane/go.sum
      - run: go test -race ./...
      - run: go vet ./...

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon testDebugUnitTest assembleDebug
        working-directory: android

  engine-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 engine/scripts/validate-catalog.py
      - run: bash -n engine/scripts/build-version.sh engine/scripts/build-all.sh

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp infra/.env.example infra/.env
      - run: docker compose -f infra/docker-compose.yml config --quiet


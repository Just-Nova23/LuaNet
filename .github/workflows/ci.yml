name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: control-plane/go.sum
      - run: go test -race ./...
      - run: go vet ./...

  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: "27.3.13750724"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: gradle/actions/setup-gradle@v6
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
      - run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$ANDROID_NDK_VERSION"
      - run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
      - run: bash tunnel/scripts/build-frpc-android.sh
      - run: bash engine/scripts/build-all.sh
      - run: FRPC_ARTIFACT=tunnel/build/android-arm64/libfrpc.so bash engine/scripts/sync-android-artifacts.sh
      - run: ./gradlew --no-daemon testDebugUnitTest assembleDebug
        working-directory: android
      - run: unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep 'lib/arm64-v8a/libfrpc.so'
      - run: |
          python3 - <<'PY' > /tmp/luanet-engine-libraries
          import json
          for item in json.load(open("engine/catalog.json"))["engines"]:
              print(f"lib/arm64-v8a/lib{item['library']}.so")
          PY
          while read -r library; do
            unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep "$library"
          done < /tmp/luanet-engine-libraries
      - uses: actions/upload-artifact@v5
        with:
          name: luanet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  engine-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python3 engine/scripts/validate-catalog.py
      - run: bash -n engine/scripts/build-version.sh engine/scripts/build-all.sh engine/scripts/sync-android-artifacts.sh tunnel/scripts/build-frpc-android.sh

  frpc-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - run: bash tunnel/scripts/build-frpc-android.sh
      - run: test -s tunnel/build/android-arm64/libfrpc.so

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cp infra/.env.example infra/.env
      - run: docker compose -f infra/docker-compose.yml config --quiet

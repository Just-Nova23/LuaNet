name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: control-plane/go.sum
      - run: go test -race ./...
      - run: go vet ./...

  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: "27.3.13750724"
      LUANET_DEBUG_KEYSTORE: ${{ github.workspace }}/android/ci-debug.keystore
      LUANET_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.LUANET_DEBUG_KEYSTORE_PASSWORD || 'luanet-debug' }}
      LUANET_DEBUG_KEY_ALIAS: ${{ secrets.LUANET_DEBUG_KEY_ALIAS || 'luanet-debug' }}
      LUANET_DEBUG_KEY_PASSWORD: ${{ secrets.LUANET_DEBUG_KEY_PASSWORD || 'luanet-debug' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: gradle/actions/setup-gradle@v6
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
      - run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$ANDROID_NDK_VERSION"
      - run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
      - run: |
          if [ -n "${LUANET_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "$LUANET_DEBUG_KEYSTORE_BASE64" | base64 -d > "$LUANET_DEBUG_KEYSTORE"
          fi
        env:
          LUANET_DEBUG_KEYSTORE_BASE64: ${{ secrets.LUANET_DEBUG_KEYSTORE_BASE64 }}
      - run: bash tunnel/scripts/build-frpc-android.sh
      - run: bash engine/scripts/build-all.sh
      - run: FRPC_ARTIFACT=tunnel/build/android-arm64/libfrpc.so bash engine/scripts/sync-android-artifacts.sh
      - run: ./gradlew --no-daemon testDebugUnitTest assembleDebug
        working-directory: android
      - name: Verify native packaging
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          apk = Path("android/app/build/outputs/apk/debug/app-debug.apk")
          listing = subprocess.check_output(["unzip", "-l", str(apk)], text=True)
          catalog = json.load(open("engine/catalog.json"))["engines"]
          base = [item for item in catalog if item.get("base")]
          legacy = [item for item in catalog if not item.get("base")]

          failures = []
          expected_base = ["lib/arm64-v8a/libfrpc.so"] + [
              f"lib/arm64-v8a/lib{item['library']}.so" for item in base
          ]
          for library in expected_base:
              if library not in listing:
                  failures.append(f"missing from base APK: {library}")

          legacy_dir = Path("android/engine_legacy/build/intermediates/merged_native_libs/debug/mergeDebugNativeLibs/out/lib/arm64-v8a")
          for item in legacy:
              legacy_library = legacy_dir / f"lib{item['library']}.so"
              if not legacy_library.is_file():
                  failures.append(f"missing from engine_legacy module: {legacy_library}")
              if f"lib/arm64-v8a/lib{item['library']}.so" in listing:
                  failures.append(f"legacy engine should not be in base APK: lib{item['library']}.so")

          if failures:
              raise SystemExit("\n".join(failures))
          print(f"Verified {len(expected_base)} base native libraries and {len(legacy)} legacy engine libraries.")
          PY
      - uses: actions/upload-artifact@v5
        with:
          name: luanet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  engine-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python3 engine/scripts/validate-catalog.py
      - run: bash -n engine/scripts/build-version.sh engine/scripts/build-all.sh engine/scripts/sync-android-artifacts.sh tunnel/scripts/build-frpc-android.sh

  frpc-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - run: bash tunnel/scripts/build-frpc-android.sh
      - run: test -s tunnel/build/android-arm64/libfrpc.so

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cp infra/.env.example infra/.env
      - run: docker compose -f infra/docker-compose.yml config --quiet

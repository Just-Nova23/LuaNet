name: luanet

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: luanet
      POSTGRES_USER: luanet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infra/.env}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luanet -d luanet"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [control]
    security_opt: [no-new-privileges:true]

  migrate:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../control-plane/migrations:/migrations:ro
    command:
      - /bin/sh
      - -ec
      - |
        for migration in /migrations/*.sql; do
          psql -v ON_ERROR_STOP=1 -h postgres -U luanet -d luanet -f "$$migration"
        done
    networks: [control]
    security_opt: [no-new-privileges:true]

  api:
    build:
      context: ../control-plane
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: production
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://luanet:${POSTGRES_PASSWORD}@postgres:5432/luanet?sslmode=disable
      PUBLIC_HOST: ${PUBLIC_HOST:-play.luanet.novaxhosting.com}
      FRP_SERVER_HOST: ${FRP_SERVER_HOST:-tunnel.luanet.novaxhosting.com}
      FRP_SERVER_PORT: "7443"
      FRP_PORT_MIN: "30000"
      FRP_PORT_MAX: "30127"
      FRP_CAPACITY: "100"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:?set FIREBASE_PROJECT_ID in infra/.env}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-service-account.json
      ANDROID_PACKAGE_NAME: net.novax.luanet
    volumes:
      - ./secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    ports:
      - 127.0.0.1:9080:8080
    networks: [control]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]

  audit-retention:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command:
      - /bin/sh
      - -ec
      - |
        while true; do
          psql -v ON_ERROR_STOP=1 -h postgres -U luanet -d luanet -f /retention.sql
          sleep 86400
        done
    volumes:
      - ../control-plane/migrations/002_retention.sql:/retention.sql:ro
    networks: [control]
    security_opt: [no-new-privileges:true]

  frps:
    image: ghcr.io/fatedier/frps:v0.69.0
    restart: unless-stopped
    depends_on: [api]
    network_mode: host
    command: ["-c", "/etc/frp/frps.toml"]
    volumes:
      - ./frps/frps.toml:/etc/frp/frps.toml:ro
      - ./secrets/frps-fullchain.pem:/run/secrets/frps-fullchain.pem:ro
      - ./secrets/frps-private-key.pem:/run/secrets/frps-private-key.pem:ro
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]

networks:
  control:
    driver: bridge

